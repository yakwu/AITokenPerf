<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AITokenPerf</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=JetBrains+Mono:wght@400;500;600&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<script src="/js/utils.js"></script>
<script src="/js/charts.js"></script>
<script src="/js/app.js"></script>
<script src="/js/dashboard.js"></script>
<script src="/js/benchmark.js"></script>
<script src="/js/history.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
</head>
<body x-data>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <div class="logo">AIToken<span>Perf</span></div>
    <div class="status-badge" :class="$store.app.status">
      <div class="status-dot"></div>
      <span x-text="$store.app.statusLabels[$store.app.status] || $store.app.status"></span>
    </div>
  </div>
</header>

<!-- Tabs -->
<nav class="tab-bar">
  <button class="tab-btn" :class="{'active': $store.app.tab === 'dashboard'}" @click="$store.app.switchTab('dashboard')">总览</button>
  <button class="tab-btn" :class="{'active': $store.app.tab === 'benchmark'}" @click="$store.app.switchTab('benchmark')">新建测试</button>
  <button class="tab-btn" :class="{'active': $store.app.tab === 'history'}" @click="$store.app.switchTab('history')">历史记录</button>
</nav>

<!-- Main -->
<main class="main">

  <!-- Dashboard Tab -->
  <section class="tab-content" :class="{'active': $store.app.tab === 'dashboard'}" x-data="dashboardTab()" x-show="$store.app.tab === 'dashboard'" x-init="$watch('$store.app.tab', val => { if (val === 'dashboard') refreshDashboard() })">
    <div x-ref="content" x-html="contentHtml"></div>
  </section>

  <!-- Benchmark Tab -->
  <section class="tab-content" :class="{'active': $store.app.tab === 'benchmark'}" x-data="benchmarkTab()" x-show="$store.app.tab === 'benchmark'">
    <div class="card">
      <div class="card-header">
        <div class="card-title">测试配置</div>
        <div class="btn-group">
          <button class="btn btn-ghost btn-sm" @click="loadConfig()">从配置加载</button>
        </div>
      </div>
      <!-- Profile 快捷切换 -->
      <div class="profile-section">
        <div class="profile-bar">
          <div class="profile-chips">
            <button class="profile-chip profile-chip-add" :class="{'active': profileMode === 'new'}" @click="newProfile()" title="新建目标服务器">
              <span class="profile-chip-add-icon">+</span>
              <span class="profile-chip-meta">新建服务器</span>
            </button>
            <template x-for="p in profiles" :key="p.name">
              <div class="profile-chip" :class="{'active': profileMode === 'selected' && currentProfileName === p.name}" @click.self="switchProfile(p.name)">
                <template x-if="profileMode === 'selected' && currentProfileName === p.name && editingProfileName">
                  <input class="profile-chip-name-edit" x-model="profileDraftName" @keydown.enter.prevent="finishRenameProfile()" @keydown.escape.prevent="cancelRenameProfile()" @blur="finishRenameProfile()" x-ref="renameInput" @click.stop>
                </template>
                <template x-if="!(profileMode === 'selected' && currentProfileName === p.name && editingProfileName)">
                  <span class="profile-chip-name" @click.stop="startRenameProfile()" :title="'点击重命名'" x-text="p.name"></span>
                </template>
                <span class="profile-chip-meta" x-text="profileHost(p.base_url)" @click.stop="switchProfile(p.name)"></span>
                <div class="profile-chip-actions" x-show="profileMode === 'selected' && currentProfileName === p.name && profileDirty" x-cloak @click.stop>
                  <button class="profile-chip-btn profile-chip-btn-overwrite" @click="saveProfile()" title="更新当前 Profile">更新</button>
                  <button class="profile-chip-btn profile-chip-btn-saveas" @click="saveAsNewProfile()" title="另存为新 Profile">另存</button>
                </div>
              </div>
            </template>
          </div>
        </div>

        <!-- 新建模式：名称输入 + 保存 -->
        <div class="profile-new-bar" x-show="profileMode === 'new' && profileReadyFieldCount() >= 2" x-transition.opacity.duration.150ms>
          <input class="profile-new-name" x-model="profileDraftName" placeholder="输入 Profile 名称" @keydown.enter.prevent="saveProfile()">
          <button class="btn btn-primary btn-sm" @click="saveProfile()" :disabled="!canSaveProfile()">保存为 Profile</button>
        </div>

        <!-- 删除确认 -->
        <div class="profile-delete-row" x-show="profileDeleteCandidate" x-cloak x-transition.opacity.duration.150ms>
          <span class="profile-delete-text">确认删除「<strong x-text="profileDeleteCandidate"></strong>」？不影响已有测试结果。</span>
          <button class="btn btn-danger btn-sm" @click="confirmDeleteProfile(profileDeleteCandidate)">删除</button>
          <button class="btn btn-ghost btn-sm" @click="cancelDeleteProfile()">取消</button>
        </div>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">目标地址</label>
          <input class="form-input" x-model="form.base_url" placeholder="https://api.anthropic.com">
        </div>
        <div class="form-group">
          <label class="form-label">API Key</label>
          <div style="position:relative">
            <input class="form-input" x-model="form.api_key" :type="showApiKey ? 'text' : 'password'" placeholder="sk-..." autocomplete="off" data-1p-ignore style="width:100%;padding-right:40px">
            <button type="button" @click="showApiKey = !showApiKey" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-tertiary);padding:4px;line-height:1" title="Show/Hide">
              <svg x-show="!showApiKey" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg x-show="showApiKey" x-cloak width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">模型</label>
          <div class="combobox" @click.outside="modelDropdownOpen = false">
            <input class="form-input" :value="modelDropdownOpen ? modelSearch : form.model" :placeholder="form.model || '请选择模型'" @focus="modelSearch = ''; modelDropdownOpen = true" @input="modelSearch = $event.target.value; modelDropdownOpen = true" @keydown.escape="modelDropdownOpen = false" autocomplete="off">
            <button class="combobox-toggle" type="button" @click.stop="if(modelDropdownOpen){modelDropdownOpen=false}else{modelSearch='';modelDropdownOpen=true}" @mousedown.prevent>
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 4.5l3 3 3-3"/></svg>
            </button>
            <div class="combobox-dropdown" x-show="modelDropdownOpen" x-cloak>
              <template x-for="m in filteredModels" :key="m">
                <div class="combobox-option" :class="{'active': form.model === m}" @mousedown.prevent="form.model = m; modelDropdownOpen = false" x-text="m"></div>
              </template>
              <div class="combobox-empty" x-show="!filteredModels.length && modelSearch">无匹配模型，将使用输入值</div>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">最大输出 Tokens</label>
          <input class="form-input" type="number" x-model="form.max_tokens">
        </div>
        <div class="form-group full">
          <label class="form-label">并发级别 <span class="info-tip" data-tip="选择并发连接数">?</span></label>
          <div class="chip-group">
            <template x-for="val in concurrencyPresets" :key="val">
              <div class="chip" :class="{ 'selected': selectedConcurrency === val }" @click="selectedConcurrency = val">
                <span x-text="val"></span>
              </div>
            </template>
            <div class="chip-custom">
              <input class="form-input" type="number" x-model="customConcurrency" placeholder="自定义" min="1" style="width:90px;padding:6px 10px;font-size:13px" @keydown.enter.prevent="addCustomConcurrency()">
              <button class="btn btn-ghost btn-sm" @click="addCustomConcurrency()" style="padding:6px 10px">+</button>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">每级请求数 <span class="info-tip" data-tip="每个并发级别发送的总请求数，默认等于并发数">?</span></label>
          <input class="form-input" type="number" x-model="requestsPerLevel" placeholder="默认等于并发数" min="1">
        </div>
        <div class="form-group">
          <label class="form-label">测试模式</label>
          <div class="radio-group-inline">
            <label class="radio-pill" :class="{'active': form.mode === 'burst'}" @click="form.mode = 'burst'">
              <span>Burst <small>瞬时并发</small></span>
            </label>
            <label class="radio-pill" :class="{'active': form.mode === 'sustained'}" @click="form.mode = 'sustained'">
              <span>Sustained <small>持续压力</small></span>
            </label>
          </div>
        </div>
        <div class="form-group" x-show="form.mode === 'sustained'" x-transition>
          <label class="form-label">持续时长 (秒) <span class="info-tip" data-tip="持续模式下每个并发级别的运行时长（秒）">?</span></label>
          <input class="form-input" type="number" x-model="form.duration">
        </div>
        <div class="form-group">
          <label class="form-label">超时时间 (秒)</label>
          <input class="form-input" type="number" x-model="form.timeout">
        </div>
        <div class="form-group full">
          <label class="form-label">系统提示词</label>
          <input class="form-input" x-model="form.system_prompt">
        </div>
        <div class="form-group full">
          <label class="form-label">用户提示词</label>
          <textarea class="form-textarea" x-model="form.user_prompt" rows="2"></textarea>
        </div>
      </div>
      <div class="btn-group" style="margin-top:20px">
        <button class="btn btn-primary" x-show="!running" @click="startBench()">开始测试</button>
        <button class="btn btn-danger" x-show="running" x-cloak @click="stopBench()">停止</button>
        <button class="btn btn-ghost" @click="dryRun()">连通性验证 <span style="font-weight:400;color:var(--text-tertiary)">(单请求)</span></button>
      </div>

    <!-- Progress Panel -->
    <div class="progress-panel" :class="{'active': running}" x-show="running" x-transition>
      <div class="card">
        <div class="card-header">
          <div class="card-title">运行中...</div>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar" :style="'width:' + (progress.total > 0 ? (progress.done / progress.total * 100).toFixed(1) : 0) + '%'"></div>
        </div>
        <div class="progress-stats">
          <div class="progress-stat">
            <div class="progress-stat-value" x-text="progress.done">0</div>
            <div class="progress-stat-label">已完成</div>
          </div>
          <div class="progress-stat">
            <div class="progress-stat-value" style="color:var(--success)" x-text="progress.success">0</div>
            <div class="progress-stat-label">成功</div>
          </div>
          <div class="progress-stat">
            <div class="progress-stat-value" style="color:var(--danger)" x-text="progress.failed">0</div>
            <div class="progress-stat-label">失败</div>
          </div>
          <div class="progress-stat">
            <div class="progress-stat-value" x-text="progress.elapsed + 's'">0s</div>
            <div class="progress-stat-label">耗时</div>
          </div>
          <div class="progress-stat">
            <div class="progress-stat-value" x-text="progress.rate">-</div>
            <div class="progress-stat-label">请求/秒</div>
          </div>
        </div>
        <div class="progress-log" x-ref="progressLog">
          <template x-for="(log, i) in logs" :key="i">
            <div x-html="log"></div>
          </template>
        </div>
      </div>
    </div>

    <!-- Live Results -->
    <div class="live-results">
      <template x-for="(lr, i) in liveResults" :key="i">
        <div class="card" style="margin-bottom:16px" x-init="$nextTick(() => { $el.querySelector('.live-result-content').innerHTML = '<div class=\'card-title\' style=\'margin-bottom:12px\'>结果 — 并发 ' + lr.concurrency + '</div>' + renderResultDetail(lr.result) })">
          <div class="live-result-content"></div>
        </div>
      </template>
    </div>
  </section>

  <!-- History Tab -->
  <section class="tab-content" :class="{'active': $store.app.tab === 'history'}" x-data="historyTab()" x-show="$store.app.tab === 'history'" x-init="$watch('$store.app.tab', val => { if (val === 'history') refresh() })">
    <div class="history-toolbar">
      <div class="search-input-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="form-input" type="text" x-model="search" @input="renderTable()" placeholder="搜索模型 / 目标地址...">
      </div>
      <div class="filter-chips">
        <!-- 模型 -->
        <div class="filter-dropdown filter-dropdown--wide" @click.outside="ddOpen = (ddOpen === 'model' ? '' : ddOpen)">
          <button class="filter-dropdown-btn" @click="ddOpen = ddOpen === 'model' ? '' : 'model'">
            <span x-text="modelFilter || '全部模型'"></span>
            <svg width="10" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1l4 4 4-4"/></svg>
          </button>
          <div class="filter-dropdown-list" x-show="ddOpen === 'model'" x-cloak>
            <div class="combobox-option" :class="{'active': !modelFilter}" @mousedown.prevent="modelFilter = ''; ddOpen = ''; renderTable()">全部模型</div>
            <template x-for="m in uniqueModels" :key="m">
              <div class="combobox-option" :class="{'active': modelFilter === m}" @mousedown.prevent="modelFilter = m; ddOpen = ''; renderTable()" x-text="m"></div>
            </template>
          </div>
        </div>
        <!-- 地址 -->
        <div class="filter-dropdown filter-dropdown--wide" @click.outside="ddOpen = (ddOpen === 'url' ? '' : ddOpen)">
          <button class="filter-dropdown-btn" @click="ddOpen = ddOpen === 'url' ? '' : 'url'">
            <span x-text="urlFilter || '全部地址'"></span>
            <svg width="10" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1l4 4 4-4"/></svg>
          </button>
          <div class="filter-dropdown-list" x-show="ddOpen === 'url'" x-cloak>
            <div class="combobox-option" :class="{'active': !urlFilter}" @mousedown.prevent="urlFilter = ''; ddOpen = ''; renderTable()">全部地址</div>
            <template x-for="u in uniqueUrls" :key="u">
              <div class="combobox-option" :class="{'active': urlFilter === u}" @mousedown.prevent="urlFilter = u; ddOpen = ''; renderTable()" x-text="u"></div>
            </template>
          </div>
        </div>
        <!-- 并发 -->
        <div class="filter-dropdown" @click.outside="ddOpen = (ddOpen === 'concurrency' ? '' : ddOpen)">
          <button class="filter-dropdown-btn" @click="ddOpen = ddOpen === 'concurrency' ? '' : 'concurrency'">
            <span x-text="concurrencyFilter ? concurrencyFilter + ' 并发' : '全部并发'"></span>
            <svg width="10" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1l4 4 4-4"/></svg>
          </button>
          <div class="filter-dropdown-list" x-show="ddOpen === 'concurrency'" x-cloak>
            <div class="combobox-option" :class="{'active': !concurrencyFilter}" @mousedown.prevent="concurrencyFilter = ''; ddOpen = ''; renderTable()">全部并发</div>
            <template x-for="c in uniqueConcurrencies" :key="c">
              <div class="combobox-option" :class="{'active': concurrencyFilter === String(c)}" @mousedown.prevent="concurrencyFilter = String(c); ddOpen = ''; renderTable()" x-text="c"></div>
            </template>
          </div>
        </div>
        <!-- 模式 -->
        <div class="filter-dropdown" @click.outside="ddOpen = (ddOpen === 'mode' ? '' : ddOpen)">
          <button class="filter-dropdown-btn" @click="ddOpen = ddOpen === 'mode' ? '' : 'mode'">
            <span x-text="modeFilter === 'burst' ? 'Burst' : modeFilter === 'sustained' ? 'Sustained' : '全部模式'"></span>
            <svg width="10" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1l4 4 4-4"/></svg>
          </button>
          <div class="filter-dropdown-list" x-show="ddOpen === 'mode'" x-cloak>
            <div class="combobox-option" :class="{'active': !modeFilter}" @mousedown.prevent="modeFilter = ''; ddOpen = ''; renderTable()">全部模式</div>
            <div class="combobox-option" :class="{'active': modeFilter === 'burst'}" @mousedown.prevent="modeFilter = 'burst'; ddOpen = ''; renderTable()">Burst</div>
            <div class="combobox-option" :class="{'active': modeFilter === 'sustained'}" @mousedown.prevent="modeFilter = 'sustained'; ddOpen = ''; renderTable()">Sustained</div>
          </div>
        </div>
      </div>
      <div class="compare-btn-wrap" x-ref="compareBtnWrap">
        <button class="btn btn-primary btn-sm" @click="openCompare()">对比</button>
        <button class="btn btn-ghost btn-sm" @click="clearCompare()">清除</button>
      </div>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:30px"></th>
              <th style="width:90px">测试 ID</th>
              <th style="width:155px" class="sortable active-sort desc" data-sort="timestamp" @click="toggleSort('timestamp')">时间 <span class="sort-arrow">&#9660;</span></th>
              <th style="width:160px">模型</th>
              <th>目标地址</th>
              <th style="width:60px" class="sortable" data-sort="concurrency" @click="toggleSort('concurrency')">并发 <span class="sort-arrow"></span></th>
              <th style="width:80px">模式</th>
              <th style="width:72px" class="sortable" data-sort="success_rate" @click="toggleSort('success_rate')">成功率 <span class="sort-arrow"></span></th>
              <th style="width:82px" class="sortable" data-sort="ttft" @click="toggleSort('ttft')">TTFT P50 <span class="sort-arrow"></span></th>
              <th style="width:82px" class="sortable" data-sort="e2e" @click="toggleSort('e2e')">E2E P50 <span class="sort-arrow"></span></th>
              <th style="width:100px" class="sortable" data-sort="throughput" @click="toggleSort('throughput')">吞吐量 <span class="sort-arrow"></span></th>
              <th style="width:64px"></th>
            </tr>
          </thead>
          <tbody x-ref="historyBody"></tbody>
        </table>
      </div>
    </div>
  </section>

</main>

<!-- Compare Modal -->
<div class="compare-overlay" id="compareOverlay" @click.self="document.getElementById('compareOverlay').classList.remove('open')">
  <div class="compare-modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h2>对比分析</h2>
      <button class="btn btn-ghost btn-sm" @click="document.getElementById('compareOverlay').classList.remove('open')">关闭</button>
    </div>
    <div id="compareContent"></div>
  </div>
</div>

</body>
</html>
