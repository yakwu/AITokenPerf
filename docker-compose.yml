services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aitokenperf
      POSTGRES_USER: aitokenperf
      POSTGRES_PASSWORD: ${DB_PASSWORD:?请在 .env 中设置 DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aitokenperf"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    image: ghcr.io/yakwu/aitokenperf:latest
    # 本地开发改用 build: . （或直接用 docker-compose.build.yml）
    ports:
      - "8080:8080"
    environment:
      TZ: Asia/Shanghai
      DATABASE_URL: postgresql+asyncpg://aitokenperf:${DB_PASSWORD}@db:5432/aitokenperf
      JWT_SECRET: ${JWT_SECRET:?请在 .env 中设置 JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      LOG_MODE: stdout
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
